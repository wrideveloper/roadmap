  <text x="72" y="88" fill="#1D2D35" font-family="Verdana" font-size="30" font-weight="700">Topologi Lab Aman</text>
  <text x="72" y="120" fill="#6A7880" font-family="Verdana" font-size="18">Semua praktik dilakukan di jaringan terisolasi. Tidak ada target publik.</text>
