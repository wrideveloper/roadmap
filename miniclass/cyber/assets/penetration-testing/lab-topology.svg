  <text x="106" y="442" fill="#7B6548" font-family="Verdana" font-size="16" font-weight="700">CATATAN</text>
  <text x="206" y="442" fill="#31464F" font-family="Verdana" font-size="18">Target sengaja rentan, jangkauan dibatasi, dan output praktik difokuskan pada pembelajaran serta reporting.</text>
