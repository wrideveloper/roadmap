  <text x="133" y="268" fill="#50636B" font-family="Verdana" font-size="18">Kali Linux atau</text>
  <text x="136" y="294" fill="#50636B" font-family="Verdana" font-size="18">Parrot OS</text>
  <text x="125" y="326" fill="#50636B" font-family="Verdana" font-size="18">Nmap, Burp, FFUF</text>
  <rect x="397" y="204" width="406" height="132" rx="24" fill="#F5EEE2" stroke="#D7C9B4" stroke-width="2"/>
  <text x="490" y="250" fill="#7B6548" font-family="Verdana" font-size="18" font-weight="700">ISOLATED NETWORK</text>
  <text x="450" y="285" fill="#243741" font-family="Verdana" font-size="24" font-weight="700">Host-Only atau NAT Network</text>
  <text x="496" y="313" fill="#596B72" font-family="Verdana" font-size="17">Hanya untuk lab internal</text>
