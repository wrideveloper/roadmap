  <text x="964" y="217" fill="#51646B" font-family="Verdana" font-size="18">custom lab</text>
  <rect x="900" y="286" width="220" height="118" rx="24" fill="#F4E7DD" stroke="#D8C5B9" stroke-width="2"/>
