  <text x="107" y="453" fill="#31464F" font-family="Verdana" font-size="18">Prinsip utama: jika pembaca baru tidak bisa memahami apa yang terjadi, mengapa itu penting, dan bagaimana mereproduksinya, maka finding belum cukup baik.</text>
